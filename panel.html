<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Tracer</title>
    <script src="vtrace.js"></script>
    <script src="tracer.js"></script>
    <style>
        :root {
            --bg-color: #282c34;
            --panel-bg-color: #21252b;
            --border-color: #3d424b;
            --text-color: #abb2bf;
            --placeholder-text-color: #5c6370;
            --primary-color: #61afef;
            --danger-color: #e06c75;
            --success-color: #98c379;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .panel {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--panel-bg-color);
        }

        h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            text-transform: uppercase;
        }
        
        #settings-panel .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .setting {
            font-size: 12px;
        }

        .setting label {
            display: block;
            margin-bottom: 4px;
        }

        .setting input[type="range"], .setting input[type="number"] {
            width: 100%;
            box-sizing: border-box;
        }
        
        .setting label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .value-indicator {
            font-size: 11px;
            color: #98c379;
            font-weight: 600;
            margin-left: 8px;
        }

        .info-icon {
            display: inline-block;
            margin-left: 6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid #888;
            color: #fff;
            background: #444;
            font-size: 11px;
            font-weight: bold;
            line-height: 16px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s, transform 0.15s;
        }
        .info-icon:hover {
            background: #61afef;
            transform: scale(1.05);
        }
        #tooltip-popup {
            position: fixed;
            display: none;
            max-width: 280px;
            background: rgba(40, 44, 52, 0.96);
            color: #d0d7de;
            border-radius: 8px;
            border: 1px solid #3d424b;
            padding: 8px 10px;
            font-size: 11px;
            z-index: 9999;
            box-shadow: 0 3px 12px rgba(0,0,0,0.35);
            pointer-events: none;
        }

        .checkbox-setting {
            display: flex;
            flex-direction: row-reverse;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .checkbox-setting label {
             margin-bottom: 0;
        }


        #preview-panel {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: none;
            padding: 0;
        }

        #upload-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border: 2px dashed var(--border-color);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }
        
        #upload-box.dragover {
            border-color: var(--primary-color);
            background-color: rgba(97, 175, 239, 0.1);
        }


        #mode-label {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            padding: 3px 7px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 20;
            pointer-events: none;
            font-weight: 600;
        }

        #close-view-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 26px;
            height: 26px;
            border: none;
            border-radius: 4px;
            background: #fff;
            color: #e06c75;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            z-index: 21;
            display: none;
            box-shadow: 0 0 0 rgba(255,0,0,0);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }
        #close-view-btn:hover {
            box-shadow: 0 0 12px 3px rgba(224, 108, 117, 0.8);
            transform: translateY(-1px);
        }

        #upload-box p {
            margin: 0 0 10px 0;
            color: var(--placeholder-text-color);
            pointer-events: none;
        }

        #url-input {
            width: 80%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
        }

        #image-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            cursor: grab;
            overflow: hidden;
        }

        #image-box:active {
            cursor: grabbing;
        }
        
        #image-box > img,
        #image-box > div > svg {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
        }

        #original-image {
            width: auto;
            height: auto;
        }

        #svg-container {
            width: 100%;
            height: 100%;
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        #svg-container svg {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
        }
        
        /* NEW: Hide the SVG container on hold to show the original image underneath */
        #image-box:active #svg-container {
            opacity: 0;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .wide-action {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .wide-action > .left-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: fit-content;
        }
        .wide-action > .right-stack {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            background-color: var(--primary-color);
            color: var(--bg-color);
            transition: background-color 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.danger {
            background-color: var(--danger-color);
            color: white;
        }
        
        button.success {
            background-color: var(--success-color);
            color: var(--bg-color);
        }

        #save-panel .button-group {
             grid-template-columns: repeat(3, 1fr);
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Settings Panel -->
        <div id="settings-panel" class="panel">
            <h3>Settings</h3>
            <div class="settings-grid">
                <div class="setting">
                    <label for="quality">Quality Preset <span class="value-indicator" data-target="quality">Balanced</span><span class="info-icon" data-tip="Скорость vs качество трассировки.">i</span></label>
                    <select id="quality" name="quality" style="width:100%; padding: 6px; border-radius:4px; background:#1e222a; color:#fff; border:1px solid #3d424b;">
                        <option value="fast">Fast</option>
                        <option value="balanced" selected>Balanced</option>
                        <option value="high">High Quality</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="colors">Colors <span class="value-indicator" data-target="colors">16</span><span class="info-icon" data-tip="Количество цветов: меньше = упрощённее. Больше = точнее и тяжелее.">i</span></label>
                    <input type="range" id="colors" name="numberofcolors" min="2" max="64" value="16">
                </div>
                <div class="setting">
                    <label for="blur">Blur <span class="value-indicator" data-target="blur">0</span><span class="info-icon" data-tip="Размытие: уменьшает мелкие шумы и сглаживает края перед трассировкой.">i</span></label>
                    <input type="range" id="blur" name="blurradius" min="0" max="10" value="0">
                </div>
                <div class="setting">
                    <label for="noise">Noise Suppression <span class="value-indicator" data-target="noise">8</span><span class="info-icon" data-tip="Шумоподавление: игнорирует короткие/мелкие контуры в итоговом SVG.">i</span></label>
                    <input type="range" id="noise" name="pathomit" min="0" max="100" value="8">
                </div>
                <div class="setting">
                    <label for="qtres">Curve Fidelity <span class="value-indicator" data-target="qtres">1</span><span class="info-icon" data-tip="Точность кривых: низкое значение сохраняет больше точных кривых.">i</span></label>
                    <input type="range" id="qtres" name="qtres" min="0" max="10" value="1" step="0.1">
                </div>
                <div class="setting">
                    <label for="ltres">Line Smoothing <span class="value-indicator" data-target="ltres">1</span><span class="info-icon" data-tip="Сглаживание: уменьшает ступенчатость линий при трассировке.">i</span></label>
                    <input type="range" id="ltres" name="ltres" min="0" max="10" value="1" step="0.1">
                </div>
                <div class="setting">
                    <label for="strokewidth">Stroke Width <span class="value-indicator" data-target="strokewidth">1</span><span class="info-icon" data-tip="Толщина контура для итогового SVG.">i</span></label>
                    <input type="number" id="strokewidth" name="strokewidth" min="0" max="20" value="1" step="0.5">
                </div>
                <div class="setting checkbox-setting">
                    <label for="linefilter">Line Filter <span class="info-icon" data-tip="Фильтр линий удаляет короткие артефакты.">i</span></label>
                    <input type="checkbox" id="linefilter" name="linefilter">
                </div>
                <div class="setting checkbox-setting">
                    <label for="rightangleenhance">Enhance Right Angles <span class="info-icon" data-tip="Усиление прямых углов выравнивает углы ближе к 90°.">i</span></label>
                    <input type="checkbox" id="rightangleenhance" name="rightangleenhance" checked>
                </div>
                <div class="setting checkbox-setting">
                    <label for="autoshapes">Auto circles/ovals <span class="info-icon" data-tip="Автоматически определяет простые круги/овалы и добавляет сглаживание в трассировку.">i</span></label>
                    <input type="checkbox" id="autoshapes" name="autoshapes" checked>
                </div>
            </div>
            <div id="tooltip-popup"></div>
        </div>

        <!-- Preview Panel -->
        <div id="preview-panel">
            <div id="upload-box">
                <p>Drag-n-drop an image here</p>
                <input type="text" id="url-input" placeholder="... or paste image URL">
                <input type="file" id="file-input" accept="image/*" hidden>
            </div>
            <div id="image-box">
                <div id="mode-label">Raster</div>
                <div id="engine-label" style="position:absolute;top:8px;right:50px;background:rgba(0,0,0,0.6);color:#fff;border-radius:4px;padding:2px 6px;font-size:10px;z-index:22;">Engine: vtrace</div>
                <button id="close-view-btn">✕</button>
                <!-- IMPORTANT: The children are now the image and the svg container -->
                <img id="original-image" src="" alt="Original Image"/>
                <div id="svg-container"></div>
            </div>
        </div>

        <!-- Action Panel -->
        <div id="action-panel" class="panel" style="display:flex; justify-content:center; gap:8px; align-items:flex-end; padding-bottom:10px;">
            <div class="left-stack" style="display:flex;flex-direction:column;gap:8px;">
                <button id="clear-btn" class="danger" disabled>Clear Trace</button>
                <button id="clear-all-btn" class="danger" disabled>Clear All</button>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
                <button id="trace-btn" class="success" disabled style="width:130px;">Trace</button>
            </div>
            <div class="right-stack" style="display:flex;flex-direction:column;gap:8px;">
                <button id="save-svg-btn" disabled>Save to SVG</button>
                <button id="copy-clipboard-btn" disabled>Copy</button>
            </div>
        </div>

    </div>

    <script src="panel.js" defer></script>

</body>
</html>
